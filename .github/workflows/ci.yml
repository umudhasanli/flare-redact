name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm test
      - if: matrix.node == 24
        run: npm pack --dry-run
      - if: matrix.node == 24
        run: npm run benchmark:adversarial
      - if: matrix.node == 24
        run: npm --prefix examples/openai-privacy install
      - if: matrix.node == 24
        run: npm --prefix examples/openai-privacy start
      - if: matrix.node == 24
        run: npm --prefix examples/express-pino install
      - if: matrix.node == 24
        run: npm --prefix examples/express-pino run smoke

  runtimes:
    name: Bun & Deno smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - uses: oven-sh/setup-bun@v2
      - run: bun scripts/runtime-smoke.mjs
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno run --allow-read scripts/runtime-smoke.mjs

  publish:
    name: Publish npm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, runtimes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - id: version
        name: Check registry version
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "$package_name@$package_version is already published"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "$package_name@$package_version will be published"
          fi
      - if: steps.version.outputs.publish == 'true'
        name: Verify npm provenance repository
        env:
          EXPECTED_REPOSITORY: https://github.com/${{ github.repository }}
        run: >-
          node -e "const p = require('./package.json');
          const expected = 'git+' + process.env.EXPECTED_REPOSITORY + '.git';
          if (p.repository?.url !== expected) {
            throw new Error('package.json repository.url must be ' + expected +
            ' for npm provenance, received ' + p.repository?.url);
          }"
      - if: steps.version.outputs.publish == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
